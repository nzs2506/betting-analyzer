name: Update Betting Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,17 * * *"

permissions:
  contents: write

concurrency:
  group: update-betting-report
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          RESULTS_DIR: docs
          HISTORY_FILE: docs/history.json
          WRITE_ARCHIVE: "0"
        run: python -X utf8 betting_analyzer.py

      - name: Commit updated report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update betting report"
          file_pattern: "docs/index.html docs/results.json docs/history.json"

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_1: ${{ secrets.TELEGRAM_CHAT_ID_1 }}
          TELEGRAM_CHAT_ID_2: ${{ secrets.TELEGRAM_CHAT_ID_2 }}
          TELEGRAM_CHAT_ID_3: ${{ secrets.TELEGRAM_CHAT_ID_3 }}
          TELEGRAM_CHAT_ID_4: ${{ secrets.TELEGRAM_CHAT_ID_4 }}
          RESULTS_JSON: docs/results.json
          TELEGRAM_STATE_JSON: docs/telegram_state.json
        run: python -X utf8 telegram_notify.py

      - name: Commit Telegram notification state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Telegram notification state"
          file_pattern: "docs/telegram_state.json"
